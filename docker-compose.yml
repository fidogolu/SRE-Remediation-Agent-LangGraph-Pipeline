version: "3.9"

services:
  app:
    build:
      context: .
      target: runtime
    volumes:
      - .:/app
      - data:/app/data
    env_file:
      - .env
    command: ["python", "main.py"]

  tests:
    build:
      context: .
      target: runtime
    volumes:
      - .:/app
      - data:/app/data
    env_file:
      - .env
    command: ["pytest", "-v"]

volumes:
  data:
